<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cerebro Code Red</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CEREBRO CODE RED SYNCHRONIZER</h1>

<script src="script.js"></script>

</body>
</html>
